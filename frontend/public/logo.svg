<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4B5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DD2A3B;stop-opacity:1" />
    </linearGradient>
    
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Load the font */
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600&amp;display=swap');

    /* --- Animations --- */
    
    /* 1. Text enters by fading in and moving up */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 2. Box lines are "drawn" */
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    /* 3. Arrow swooshes in */
    @keyframes arrowSwoosh {
      from { 
        opacity: 0;
        transform: translate(-25px, 10px) scale(0.8) rotate(-15deg);
      }
      to { 
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
    }
    
    /* 4. Gentle, continuous floating for the finished icon */
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* --- Element Styles --- */

    .logo-text {
      font-family: 'Fredoka', sans-serif;
      font-size: 42px;
      font-weight: 600;
      fill: url(#brandGrad);
      /* Apply shadow and entrance animation */
      filter: url(#softShadow);
      opacity: 0; /* Start invisible */
      animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s forwards;
    }

    .icon-group {
      /* The entire icon group floats after it's built */
      animation: gentleFloat 2.5s ease-in-out 1.8s infinite;
    }

    .box-line {
      fill: none;
      stroke: url(#brandGrad);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* Prepare for draw animation */
      stroke-dasharray: 110;
      stroke-dashoffset: 110;
      animation: drawLine 0.8s ease-out 0.6s forwards;
    }
    
    .arrow-shape {
      fill: url(#brandGrad);
      /* Prepare for swoosh animation */
      opacity: 0;
      transform-origin: center;
      animation: arrowSwoosh 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards;
    }
  </style>

  <g class="icon-group" transform="translate(10, 15)">
    <path class="box-line" d="M15,10 L35,10 C38,10 40,12 40,15 L40,35 C40,38 38,40 35,40 L15,40 C12,40 10,38 10,35 L10,15 C10,12 12,10 15,10 Z" />
    <path class="arrow-shape" d="M5,25 C5,25 15,45 30,30 L42,22 L32,18 C32,18 35,25 30,28 C25,31 15,20 5,25 Z" />
  </g>

  <text x="65" y="48" class="logo-text">Floventory</text>
  
</svg>
