name: Backend CI (Staging)

on:
  push:
    branches: [tempmain]
    paths:
      - "backend/**"
  pull_request:
    branches: [tempmain]
    paths:
      - "backend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build
